# ==============================================================================
# 反向代理：在 IDE Services 前面终止 TLS（HTTPS），后端仍走容器内 http。
# 参考: https://www.jetbrains.com/help/ide-services/system-requirements.html#high-availability
# ==============================================================================
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 插件 / IDE artifacts 上传可能很大，取消请求体大小限制
    client_max_body_size 0;

    # 支持 WebSocket 升级（IDE Services 部分接口需要）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP -> HTTPS 跳转
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS 入口
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://ide-services:8080;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host  $host;

            # WebSocket
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 大文件下载 / 长连接
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering    off;
        }
    }
}
